# Postgres for Augur Terminal. Runs on 5544 to avoid clashing with other
# local postgres instances on the default 5432.
services:
  postgres:
    image: postgres:16-alpine
    container_name: augur-postgres
    environment:
      POSTGRES_USER: augur
      POSTGRES_PASSWORD: augur
      POSTGRES_DB: augur
    ports:
      - "5544:5432"
    volumes:
      - augur-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U augur"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  augur-pgdata:
